server:
  port: 3002
  secret_key: ${SECRET_KEY:-sse-dashboard-dev-secret-key-change-in-prod-please}
  http:
    timeout: 3600
  security_headers:
    content_security_policy: "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline'"
  static_files:
    prefix: /static
templates:
  path: templates
