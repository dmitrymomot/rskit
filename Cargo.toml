[package]
name = "modo"
version = "0.1.0"
edition = "2024"
description = "Rust web framework for small monolithic apps"
license = "MIT"
repository = "https://github.com/dmitrymomot/modo"

[features]
default = ["sqlite"]
full = ["sqlite", "templates", "sse", "oauth", "sentry"]
sentry = ["dep:sentry", "dep:sentry-tracing"]
sqlite = ["sqlx/sqlite"]
postgres = ["sqlx/postgres"]
templates = []
sse = []
oauth = []

[dependencies]
# Web
axum = { version = "0.8", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["compression-full", "catch-panic", "trace", "cors", "request-id", "set-header", "sensitive-headers"] }

axum-extra = { version = "0.12", features = ["cookie-signed", "cookie-private", "multipart"] }
cookie = { version = "0.18", features = ["signed"] }
tower_governor = { version = "0.8", default-features = false, features = ["axum"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "chrono", "migrate"], default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
serde_urlencoded = "0.7"

# Error handling
thiserror = "2"
anyhow = "1"

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Utilities
ulid = "1"
rand = "0.10"
chrono = { version = "0.4", features = ["serde"] }
http = "1"
regex = "1"
nanohtml2text = "0.2"
bytes = "1"
sentry = { version = "0.38", optional = true, default-features = false, features = ["backtrace", "contexts", "panic", "reqwest", "rustls"] }
sentry-tracing = { version = "0.38", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
serial_test = "3"
