[package]
name = "modo"
version = "0.1.0"
edition = "2024"
description = "Rust web framework for small monolithic apps"
license = "MIT"
repository = "https://github.com/dmitrymomot/modo"

[features]
default = []
full = ["templates", "sse", "auth", "sentry"]
sentry = ["dep:sentry", "dep:sentry-tracing"]
templates = []
sse = []
auth = ["dep:argon2", "dep:hmac", "dep:sha1", "dep:data-encoding", "dep:subtle", "dep:hyper-rustls", "dep:hyper-util", "dep:http-body-util"]

[dependencies]
# Web
axum = { version = "0.8", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["compression-full", "catch-panic", "trace", "cors", "request-id", "set-header", "sensitive-headers"] }

axum-extra = { version = "0.12", features = ["cookie-signed", "cookie-private", "multipart"] }
cookie = { version = "0.18", features = ["signed"] }
tower_governor = { version = "0.8", default-features = false, features = ["axum"] }
governor = "0.10"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "chrono", "migrate", "derive", "sqlite"], default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
serde_urlencoded = "0.7"

# Error handling
thiserror = "2"
anyhow = "1"

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Utilities
ulid = "1"
rand = "0.10"
chrono = { version = "0.4", features = ["serde"] }
http = "1"
regex = "1"
nanohtml2text = "0.2"
sha2 = "0.10"
ipnet = "2"
bytes = "1"
sentry = { version = "0.38", optional = true, default-features = false, features = ["backtrace", "contexts", "panic", "reqwest", "rustls"] }
sentry-tracing = { version = "0.38", optional = true }

# Auth (optional, gated by "auth" feature)
argon2 = { version = "0.5", optional = true }
hmac = { version = "0.12", optional = true }
sha1 = { version = "0.10", optional = true }
data-encoding = { version = "2", optional = true }
subtle = { version = "2", optional = true }
hyper-rustls = { version = "0.27", optional = true, default-features = false, features = ["ring", "http1", "tls12", "logging", "webpki-roots"] }
hyper-util = { version = "0.1", optional = true, features = ["client-legacy", "http1", "tokio"] }
http-body-util = { version = "0.1", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
serial_test = "3"
