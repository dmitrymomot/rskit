name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --features test-helpers --tests -- -D warnings

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features test-helpers

  publish:
    name: Publish to crates.io
    needs: [changes, fmt, lint, test]
    if: >-
      always()
      && github.ref == 'refs/heads/main'
      && needs.changes.outputs.rust == 'true'
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Local version: $LOCAL"
          HTTP_CODE=$(curl -s -o /tmp/crate.json -w '%{http_code}' \
            -H 'User-Agent: modo-ci (github.com/dmitrymomot/modo)' \
            "https://crates.io/api/v1/crates/modo-rs/$LOCAL")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Version $LOCAL already published, skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $LOCAL not found on crates.io (HTTP $HTTP_CODE), will publish."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.version.outputs.changed == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.version.outputs.changed == 'true'

      - name: Publish modo
        if: steps.version.outputs.changed == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'already exists' /tmp/publish.log; then
              echo "Version already exists on crates.io, skipping."
              exit 0
            fi
            exit $status
          fi
