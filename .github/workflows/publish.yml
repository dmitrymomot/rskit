name: Publish Crates

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '!examples/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish changed crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crates with version changes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e

          # Publishable crates in dependency order.
          # Format: "directory:package-name"
          # Note: modo-cli is intentionally excluded (publish = false in Cargo.toml).
          CRATES=(
            "modo-macros:modo-macros"
            "modo-db-macros:modo-db-macros"
            "modo-jobs-macros:modo-jobs-macros"
            "modo-upload-macros:modo-upload-macros"
            "modo:modo"
            "modo-db:modo-db"
            "modo-email:modo-email"
            "modo-tenant:modo-tenant"
            "modo-upload:modo-upload"
            "modo-jobs:modo-jobs"
            "modo-session:modo-session"
            "modo-auth:modo-auth"
          )

          published=0

          for entry in "${CRATES[@]}"; do
            dir="${entry%%:*}"
            name="${entry##*:}"
            toml="$dir/Cargo.toml"

            # Get the currently published version from crates.io (empty if unpublished).
            old_version=$(cargo search "$name" --limit 1 2>/dev/null \
              | grep "^${name} " | sed 's/.*= "\(.*\)".*/\1/') || old_version=""

            new_version=$(grep '^version' "$toml" | head -1 | sed 's/.*"\(.*\)"/\1/')

            if [ "$old_version" = "$new_version" ]; then
              echo "::debug::$name $new_version unchanged — skipping"
              continue
            fi

            echo "Publishing $name $new_version (was ${old_version:-<new>})..."
            cargo publish -p "$name"
            published=$((published + 1))

            # Wait for crates.io index to reflect the new version before publishing dependents.
            echo "Waiting for $name $new_version to appear in crates.io index..."
            indexed_ok=false
            for i in $(seq 1 12); do
              sleep 10
              indexed=$(cargo search "$name" --limit 1 2>/dev/null \
                | grep "^${name} " | sed 's/.*= "\(.*\)".*/\1/') || indexed=""
              if [ "$indexed" = "$new_version" ]; then
                echo "$name $new_version is indexed."
                indexed_ok=true
                break
              fi
              echo "Attempt $i/12: index shows '${indexed:-<none>}', waiting..."
            done
            if [ "$indexed_ok" = false ]; then
              echo "::error::$name $new_version not indexed after 120s — aborting to prevent dependent publish failures"
              exit 1
            fi
          done

          echo "Done. Published $published crate(s)."
