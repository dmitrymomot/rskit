name: Publish Crates

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '!examples/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish changed crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crates with version changes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e

          ROOT_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          crate_version() {
            curl -sf "https://crates.io/api/v1/crates/$1" \
              | sed -n 's/.*"max_version"\s*:\s*"\([^"]*\)".*/\1/p'
          }

          PUBLISHED=$(crate_version "modo") || PUBLISHED=""

          if [ "$ROOT_VERSION" = "$PUBLISHED" ]; then
            echo "Version $ROOT_VERSION unchanged — nothing to publish"
            exit 0
          fi

          echo "Publishing all crates at version $ROOT_VERSION (was ${PUBLISHED:-<new>})..."

          # Macro crates with circular dev-deps need --no-verify
          NO_VERIFY_CRATES="modo-db-macros modo-jobs-macros modo-upload-macros"

          # Topological order based on normal (non-dev) dependencies
          CRATES=(
            modo-macros
            modo-db-macros
            modo-jobs-macros
            modo-upload-macros
            modo-cli
            modo
            modo-db
            modo-email
            modo-tenant
            modo-jobs
            modo-upload
            modo-session
            modo-auth
          )

          published=0

          for name in "${CRATES[@]}"; do
            echo "Publishing $name $ROOT_VERSION..."
            flags=""
            if echo "$NO_VERIFY_CRATES" | grep -qw "$name"; then
              flags="--no-verify"
            fi
            if ! publish_output=$(cargo publish -p "$name" $flags 2>&1); then
              if echo "$publish_output" | grep -q "already exists"; then
                echo "$name $ROOT_VERSION already on crates.io — skipping"
                continue
              fi
              echo "$publish_output" >&2
              exit 1
            fi
            published=$((published + 1))
            sleep 5
          done

          echo "Done. Published $published crate(s)."
